<body>
    <!-- Splash Screen -->
    <div id="splash-screen" style="position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #ffffff; display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 9999; transition: opacity 0.5s ease, visibility 0.5s;">
        <div style="width: 130px; height: 130px; position: relative;">
            <img src="src/assets/icon.png" alt="Logo" style="width: 100%; height: 100%; object-fit: contain; animation: splashPulse 2s infinite ease-in-out;">
        </div>
        <div style="margin-top: 24px; font-weight: 800; color: #1e293b; font-size: 16px; letter-spacing: 3px; text-transform: uppercase; font-family: 'Inter', sans-serif;">App Ventas Lolo Serantes</div>
        <style>
            @keyframes splashPulse {
                0%, 100% { transform: scale(1); filter: brightness(1); }
                50% { transform: scale(1.05); filter: brightness(1.1); }
            }
            .splash-hidden { opacity: 0 !important; visibility: hidden !important; }
        </style>
    </div>

    <div id="app">
        <!-- La aplicación se renderiza aquí -->
    </div>
